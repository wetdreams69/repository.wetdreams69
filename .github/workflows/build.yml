name: Build Kodi Repo

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build and publish Kodi repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq curl unzip zip > /dev/null 2>&1 || true

      - name: Create folders
        run: |
          mkdir -p repo
          mkdir -p zips
          mkdir -p zips_download

      - name: Package repository addon
        run: |
          repo_version=$(python3 -c "import xml.etree.ElementTree as ET; print(ET.parse('repository.wetdreams69/addon.xml').getroot().attrib['version'])")
          mkdir -p repo/repository.wetdreams69
          cp repository.wetdreams69/addon.xml repo/repository.wetdreams69/addon.xml
          zip -qr "repo/repository.wetdreams69/repository.wetdreams69-${repo_version}.zip" repository.wetdreams69
          zip -qr zips/repository.wetdreams69.zip repository.wetdreams69
          cp "repo/repository.wetdreams69/repository.wetdreams69-${repo_version}.zip" repository.zip

      - name: Download all addon releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repos=(
            "plugin.video.mercadoplay"
            "plugin.video.youtubemovieslatino"
            "plugin.video.pluto_vod"
            "plugin.video.angulismo"
            "script.module.cacheman"
            "script.module.adskipper"
          )
          for repo in "${repos[@]}"; do
            gh api repos/wetdreams69/$repo/releases \
              --jq '.[] | .assets[] | select(.name | endswith(".zip")) | [.name, .browser_download_url] | @tsv' |
            while IFS=$'\t' read -r asset_name asset_url; do
              if [ ! -f "zips_download/$asset_name" ]; then
                curl -L "$asset_url" -o "zips_download/$asset_name"
              fi
            done
          done

      - name: Process downloaded addon zips
        run: |
          python3 process_zips.py
          rm -rf zips_download

      - name: Generate addons.xml and md5
        run: |
          echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>" > repo/addons.xml
          echo "<addons>" >> repo/addons.xml
          find repo -name addon.xml | sort | while read addon; do
            sed '1d' "$addon" >> repo/addons.xml
            echo "" >> repo/addons.xml
          done
          echo "</addons>" >> repo/addons.xml
          md5sum repo/addons.xml | cut -d ' ' -f1 > repo/addons.xml.md5

      - name: Generate Directory Index (Github Pages Apache mimic)
        run: |
          python3 generate_index.py repo

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            repository.zip
            zips/repository.wetdreams69.zip
          tag_name: repo-${{ github.sha }}
          body: |
            Kodi Repository Update
            - Add repository source to Kodi: `https://wetdreams69.github.io/repository.wetdreams69/`
            - Included addons: MercadoPlay, Pluto VOD, Youtube Latino