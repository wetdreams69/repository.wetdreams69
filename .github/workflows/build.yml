name: Build Kodi Repo

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build and publish Kodi repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Actualizado a v4 para arreglar advertencia de Node.js

      - name: Install dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq curl unzip zip > /dev/null 2>&1 || true

      - name: Create folders
        run: |
          mkdir -p repo
          mkdir -p zips



      - name: Package repository addon
        run: |
          zip -qr zips/repository.wetdreams69.zip repository.wetdreams69

      - name: Download addon zips
        run: |
          curl -L -o zips/plugin.video.mercadoplay.zip https://github.com/wetdreams69/plugin.video.mercadoplay/raw/master/plugin.video.mercadoplay.zip
          curl -L -o zips/plugin.video.youtubemovieslatino.zip https://github.com/wetdreams69/plugin.video.youtubemovieslatino/raw/main/plugin.video.youtubemovieslatino.zip
          curl -L -o zips/plugin.video.pluto_vod.zip https://github.com/wetdreams69/plugin.video.pluto_vod/raw/master/plugin.video.pluto_vod.zip

      - name: Unzip addons and extract addon.xml
        run: |
          for zip in zips/*.zip; do
            unzip -q -o "$zip" -d repo/
          done

      - name: Generate addons.xml and md5
        run: |
          echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>" > repo/addons.xml
          echo "<addons>" >> repo/addons.xml
          find repo -name addon.xml | sort | while read addon; do
            grep -v "<?xml" "$addon" >> repo/addons.xml
            echo "" >> repo/addons.xml
          done
          echo "</addons>" >> repo/addons.xml
          md5sum repo/addons.xml | cut -d ' ' -f1 > repo/addons.xml.md5

      - name: Organize zip files according to Kodi specifications
        run: |
          for addon_xml in repo/*/addon.xml; do
            addon_dir=$(dirname "$addon_xml")
            addon_id=$(basename "$addon_dir")
            addon_version=$(grep -oP '<addon[^>]+version="\K[^"]+' "$addon_xml" | head -1)
            
            if [ -n "$addon_id" ] && [ -n "$addon_version" ]; then
              if [ -f "zips/$addon_id.zip" ]; then
                cp "zips/$addon_id.zip" "repo/$addon_id/${addon_id}-${addon_version}.zip"
              else
                cd repo
                zip -qr "$addon_id/${addon_id}-${addon_version}.zip" "$addon_id"
                cd ..
              fi
            fi
          done
          
          # Copiar el zip del repositorio a la raíz para compatibilidad de Kodi "Add Source"
          cp "repo/repository.wetdreams69/repository.wetdreams69-1.0.0.zip" "repo/repository.wetdreams69-1.0.0.zip"
          
          echo "=== Repository contents ==="
          ls -lah repo/

      - name: Create repository ZIP (for GitHub Release)
        run: |
          cd repo
          zip -qr ../repository.zip .
          cd ..
          echo "=== Repository ZIP created ==="

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Generate Directory Index (Github Pages Apache mimic)
        run: |
          python3 generate_index.py repo

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4 # Excelente idea de push a gh-pages
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: gh-pages
          keep_files: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2 # Actualizado a v2 para advertencia de Node.js
        with:
          files: |
            repository.zip
            zips/repository.wetdreams69.zip
          tag_name: repo-${{ steps.date.outputs.date }}
          body: |
            Kodi Repository Build
            
            **Cómo instalar en Kodi:**
            1. Descarga el archivo `repository.wetdreams69.zip` de los *Assets* a continuación.
            2. Abre Kodi -> Ve a Add-ons (Complementos) -> Install from zip file (Instalar desde un archivo zip).
            3. Selecciona `repository.wetdreams69.zip` para instalar el repositorio en el sistema.
            
            **Addons incluidos:**
            - plugin.video.mercadoplay
            - plugin.video.pluto_vod
            - plugin.video.youtubemovieslatino
