name: Build Kodi Repo

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build and publish Kodi repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq curl unzip zip > /dev/null 2>&1 || true

      - name: Create folders
        run: |
          mkdir -p repo
          mkdir -p zips

      - name: Package repository addon
        run: |
          zip -qr zips/repository.wetdreams69.zip repository.wetdreams69

      - name: Download addon zips
        run: |
          curl -L -o zips/plugin.video.mercadoplay.zip https://github.com/wetdreams69/plugin.video.mercadoplay/raw/master/plugin.video.mercadoplay.zip
          curl -L -o zips/plugin.video.youtubemovieslatino.zip https://github.com/wetdreams69/plugin.video.youtubemovieslatino/raw/main/plugin.video.youtubemovieslatino.zip
          curl -L -o zips/plugin.video.pluto_vod.zip https://github.com/wetdreams69/plugin.video.pluto_vod/raw/master/plugin.video.pluto_vod.zip

      - name: Unzip addons and build structure
        run: |
          for zip in zips/*.zip; do
            unzip -q -o "$zip" -d repo/
          done

      - name: Generate addons.xml and md5
        run: |
          echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>" > repo/addons.xml
          echo "<addons>" >> repo/addons.xml
          find repo -name addon.xml | sort | while read addon; do
            # Extract content minus the first line (<?xml...)
            sed '1d' "$addon" >> repo/addons.xml
            echo "" >> repo/addons.xml
          done
          echo "</addons>" >> repo/addons.xml
          md5sum repo/addons.xml | cut -d ' ' -f1 > repo/addons.xml.md5

      - name: Organize zip files according to Kodi specifications
        run: |
          for addon_xml in repo/*/addon.xml; do
            addon_dir=$(dirname "$addon_xml")
            addon_id=$(python3 -c "import xml.etree.ElementTree as ET; print(ET.parse('$addon_xml').getroot().attrib['id'])")
            addon_version=$(python3 -c "import xml.etree.ElementTree as ET; print(ET.parse('$addon_xml').getroot().attrib['version'])")
            
            if [ -n "$addon_id" ] && [ -n "$addon_version" ]; then
              if [ -f "zips/$addon_id.zip" ]; then
                cp "zips/$addon_id.zip" "repo/$addon_id/${addon_id}-${addon_version}.zip"
              else
                cd repo
                zip -qr "$addon_id/${addon_id}-${addon_version}.zip" "$addon_id"
                cd ..
              fi
            fi
          done
          
          # Repositorio ZIP para el RELEASE
          cp "repo/repository.wetdreams69/repository.wetdreams69-1.0.0.zip" "repository.zip"
          
          echo "=== Repository contents ==="
          ls -R repo/

      - name: Generate Directory Index (Github Pages Apache mimic)
        run: |
          python3 generate_index.py repo

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            repository.zip
            zips/repository.wetdreams69.zip
          tag_name: repo-${{ github.sha }}
          body: |
            Kodi Repository Update
            - Add repository source to Kodi: `https://wetdreams69.github.io/repository.wetdreams69/`
            - Included addons: MercadoPlay, Pluto VOD, Youtube Latino
