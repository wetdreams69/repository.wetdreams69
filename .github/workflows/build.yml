name: Build Kodi Repo

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build and publish Kodi repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq curl unzip > /dev/null 2>&1 || true

      - name: Create folders
        run: |
          mkdir -p repo
          mkdir -p zips

      - name: Download addon zips
        run: |
          curl -L -o zips/plugin.video.mercadoplay.zip https://github.com/wetdreams69/plugin.video.mercadoplay/raw/master/plugin.video.mercadoplay.zip
          curl -L -o zips/plugin.video.youtubemovieslatino.zip https://github.com/wetdreams69/plugin.video.youtubemovieslatino/raw/main/plugin.video.youtubemovieslatino.zip
          curl -L -o zips/plugin.video.pluto_vod.zip https://github.com/wetdreams69/plugin.video.pluto_vod/raw/master/plugin.video.pluto_vod.zip

      - name: Unzip addons and extract addon.xml
        run: |
          for zip in zips/*.zip; do
            unzip -o "$zip" -d repo/
          done

      - name: Generate addons.xml and md5
        run: |
          echo "<addons>" > repo/addons.xml
          find repo -name addon.xml | while read addon; do
            cat "$addon" | tr -d '\n' >> repo/addons.xml
          done
          echo "</addons>" >> repo/addons.xml
          md5sum repo/addons.xml | cut -d ' ' -f1 > repo/addons.xml.md5

      - name: Copy zips to repo
        run: |
          cp zips/*.zip repo/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: gh-pages
